name: Deploy to Contabo VPS

on:
  push:
    branches: [master, main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Contabo
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 173.249.37.118
          username: root
          key: ${{ secrets.CONTABO_SSH_KEY }}
          port: 22
          script: /root/deploy.sh
          script_stop: true
          timeout: 300s
